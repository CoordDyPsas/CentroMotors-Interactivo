<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DyP — Toyota Colón</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="manifest" href="manifest.json">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif; background: #0d0d1a; color: #f0f0f0; height: 100vh; display: flex; flex-direction: column; }

.header {
  background: rgba(10,10,10,0.95); -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
  padding: 10px 18px; display: flex; align-items: center; gap: 12px;
  border-bottom: 2px solid #ff6900; flex-shrink: 0; box-shadow: 0 2px 20px rgba(0,0,0,0.4); position: relative; z-index: 10;
  flex-wrap: wrap; transition: background 0.4s ease;
}
.header h1 { font-size: 18px; color: #fff; letter-spacing: 0.5px; }
.header h1 span { color: #ff6900; font-weight: 700; }
.volver-btn {
  background: none; border: 1px solid rgba(255,105,0,0.3); color: #aaa;
  padding: 4px 8px; border-radius: 6px; cursor: pointer;
  font-size: 18px; transition: 0.2s; text-decoration: none; display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; flex-shrink: 0;
}
.volver-btn:hover { border-color: #ff6900; color: #fff; }
.piso-selector { display: flex; gap: 6px; flex-shrink: 0; }
.piso-btn {
  padding: 7px 16px; border: none; border-radius: 6px; cursor: pointer;
  font-weight: 600; font-size: 13px; transition: 0.2s; font-family: 'Inter', sans-serif;
}
.piso-btn.active { background: #ff6900; color: #fff; }
.piso-btn:not(.active) { background: #515151; color: #aaa; border: none; }
.piso-btn:not(.active):hover { background: #666; }
.piso-btn:not(.active).lista-btn { background: #515151; color: #fff; border: none; border-radius: 4px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: 700; padding: 0; font-size: 16px; }
.piso-btn:not(.active).lista-btn:hover { background: #666; }
.lista-overlay {
  display: none; position: fixed; inset: 0; z-index: 5000;
  background: rgba(0,0,0,0.6); justify-content: center; align-items: center;
}
.lista-overlay.activo { display: flex; }
.lista-panel {
  background: rgba(15,15,25,0.98); border: 1px solid #333; border-radius: 12px;
  width: 90%; max-width: 500px; max-height: 80vh; display: flex;
  flex-direction: column; overflow: hidden;
}
.lista-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px; background: rgba(10,10,10,0.95);
  border-bottom: 1px solid #333; font-size: 16px; font-weight: 700;
}
.lista-cerrar {
  background: none; border: none; color: #ff6900; font-size: 22px;
  cursor: pointer; width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.lista-cerrar:hover { background: rgba(255,105,0,0.2); }
.lista-body {
  flex: 1; overflow-y: auto; padding: 8px;
}
.lista-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  cursor: pointer; border-radius: 6px; transition: 0.15s;
}
.lista-item:hover { background: rgba(255,255,255,0.04); }
.lista-item .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.lista-item .nro { font-weight: 700; min-width: 36px; }
.lista-item .ub { font-size: 13px; color: #888; flex: 1; }
.lista-item .estado-tag { font-size: 11px; padding: 2px 8px; border-radius: 8px; }
.leyenda { display: flex; gap: 16px; font-size: 12px; color: #aaa; align-items: center; }
.leyenda span { display: flex; align-items: center; gap: 4px; }
.leyenda .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.zoom-controls {
  display: flex; gap: 4px; align-items: center;
}
.zoom-btn {
  width: 32px; height: 32px; border: none; border-radius: 4px; cursor: pointer;
  background: #515151; color: #fff; font-size: 16px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.zoom-btn:hover { background: #666666; }
.zoom-level { font-size: 12px; color: #aaa; min-width: 44px; text-align: center; }

.contenedor { display: flex; flex: 1; overflow: hidden; }

.plano-wrapper {
  flex: 1; overflow: hidden; position: relative; background: #0a0a1a;
  background-image: radial-gradient(circle, #515151 1px, transparent 1px);
  background-size: 40px 40px; cursor: grab; touch-action: none;
}
.plano-wrapper.grabbing { cursor: grabbing; }
.minimapa {
  position: absolute; bottom: 12px; right: 12px; z-index: 100;
  width: 160px; height: 113px; border: 2px solid #ff6900;
  border-radius: 6px; background: rgba(0,0,0,0.6);
  cursor: pointer; opacity: 0.7; transition: opacity 0.2s;
}
.minimapa:hover { opacity: 1; }
#plano-container { position: absolute; transform-origin: 0 0; transition: opacity 0.3s ease; }
#plano-container img { display: block; user-select: none; pointer-events: none; }

.marker {
  position: absolute; width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
  border: 2.5px solid #fff; cursor: pointer;
  transform: translate(-50%, -50%);
  box-shadow: 0 2px 8px rgba(0,0,0,0.6);
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s;
  z-index: 10;
}
.marker:hover {
  transform: translate(-50%, -50%) scale(1.4);
  z-index: 100;
}
.marker.necesita { background: #e94560; box-shadow: 0 0 12px rgba(233,69,96,0.6), 0 2px 8px rgba(0,0,0,0.6); animation: pulse-necesita 2s ease-in-out infinite; }
.marker.ok { background: #2ecc71; box-shadow: 0 0 12px rgba(46,204,113,0.5), 0 2px 8px rgba(0,0,0,0.6); }
.marker.nofunciona { background: #666; box-shadow: 0 0 12px rgba(102,102,102,0.4), 0 2px 8px rgba(0,0,0,0.6); }
.marker::after {
  content: ''; position: absolute; inset: -6px; border-radius: 50%;
  border: 2px solid transparent; transition: all 0.3s;
}
.marker:hover::after {
  border-color: inherit; transform: scale(1.1); opacity: 0.5;
}
.marker.necesita::after { border-color: #e94560; }
.marker.ok::after { border-color: #2ecc71; }
.marker.nofunciona::after { border-color: #666; }
@keyframes pulse-necesita {
  0%, 100% { box-shadow: 0 0 12px rgba(233,69,96,0.6), 0 2px 8px rgba(0,0,0,0.6); }
  50% { box-shadow: 0 0 20px rgba(233,69,96,0.9), 0 2px 12px rgba(0,0,0,0.6); }
}
@keyframes flash-marker {
  0% { filter: brightness(1); transform: translate(-50%, -50%) scale(1); }
  25% { filter: brightness(1.8); transform: translate(-50%, -50%) scale(1.5); }
  50% { filter: brightness(1); transform: translate(-50%, -50%) scale(1); }
  75% { filter: brightness(1.4); transform: translate(-50%, -50%) scale(1.2); }
  100% { filter: brightness(1); transform: translate(-50%, -50%) scale(1); }
}
.marker.flash { animation: flash-marker 0.6s ease-out !important; }

.tooltip {
  position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.92); color: #fff; padding: 14px 18px; border-radius: 12px;
  font-size: 20px; white-space: normal; min-width: 290px; max-width: 400px; text-align: left;
  line-height: 1.7;
  pointer-events: none; z-index: 200; display: none; border: 2px solid #ff6900;
  box-shadow: 0 0 28px rgba(255,105,0,0.6);
}
.marker:hover .tooltip { display: block; }
.tooltip .tt-label { color: rgba(255,255,255,0.5); }
.tooltip .tt-dot { display: inline-block; width: 13px; height: 13px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
.tooltip::after {
  content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
  border: 6px solid transparent; border-top-color: #ff6900;
}

.panel {
  width: 380px; background: rgba(10,10,10,0.97); flex-shrink: 0;
  display: flex; flex-direction: column; border-left: 2px solid #ff6900;
  transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
.panel.cerrado { width: 0; overflow: hidden; opacity: 0; border: none; }
.panel-header {
  padding: 16px 20px; background: rgba(10,10,10,0.95); display: flex;
  align-items: center; justify-content: space-between; border-bottom: 2px solid #ff6900;
}
.panel-header h2 { font-size: 16px; letter-spacing: 0.3px; }
.foto-indicator { font-size: 11px; display: inline-flex; align-items: center; gap: 4px; cursor: pointer; color: #ff6900; font-weight: 600; }
.foto-indicator.no-fotos { color: #888; cursor: default; }
.foto-indicator i { font-size: 14px; }
.panel-close {
  background: none; border: none; color: #ff6900; font-size: 22px;
  cursor: pointer; width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; transition: 0.2s;
}
.panel-close:hover { background: rgba(255,105,0,0.2); transform: rotate(90deg); }
.panel-copy {
  background: none; border: none; color: #ff6900; font-size: 16px;
  cursor: pointer; width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; transition: 0.2s;
}
.panel-copy:hover { background: rgba(255,105,0,0.2); transform: scale(1.15); }
.panel-body { flex: 1; overflow-y: auto; padding: 20px; background: rgba(10,10,10,0.97); }

.foto-container {
  width: 100%; height: 220px; border-radius: 8px; overflow: hidden;
  margin-bottom: 4px; border: 1px solid #ff6900; position: relative;
  display: flex; flex-direction: column;
}
.foto-track {
  display: flex; flex: 1; overflow-x: auto; overflow-y: hidden;
  scroll-snap-type: x mandatory; scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch; cursor: grab;
}
.foto-track.dragging { cursor: grabbing; scroll-behavior: auto; }
.foto-track::-webkit-scrollbar { display: none; }
.carousel-slide {
  flex: 0 0 100%; height: 100%; scroll-snap-align: start;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, #2a2a2a, #0a0a1a);
  position: relative;
}
.carousel-slide img {
  width: 100%; height: 100%; object-fit: contain; cursor: zoom-in;
}
.carousel-slide .sin-foto {
  color: #666; font-size: 14px; text-align: center; padding: 20px;
}
.carousel-slide .sin-foto .icon { font-size: 48px; margin-bottom: 12px; filter: grayscale(0.5); }
.ot-link { color: #ff6900; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
.ot-link:hover { text-decoration: underline; }
.carousel-dots {
  display: flex; justify-content: center; gap: 6px; padding: 6px 0;
  background: rgba(255,255,255,0.03); border-top: 1px solid #333;
  min-height: 24px;
}
.carousel-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #666; border: none; cursor: pointer; transition: 0.2s;
  padding: 0;
}
.carousel-dot.activo { background: #ff6900; transform: scale(1.3); }
.carousel-dot:hover { background: #ff8533; }
.carousel-dot.oculto { display: none; }

.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.info-item {
  padding: 12px 14px; background: #515151; border-radius: 6px;
  border-left: 3px solid #ff6900; display: flex; align-items: center; gap: 10px;
}
.info-item .label-icon { font-size: 20px; color: #ff6900; flex-shrink: 0; width: 22px; text-align: center; }
.info-item > div { min-width: 0; flex: 1; }
.info-item .label { font-size: 10px; color: #ff6900; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
.info-item .value { font-size: 15px; font-weight: 600; }
.info-item .value .fecha-rel { font-weight: 400; color: #999; font-size: 13px; }
.info-item.full { grid-column: 1 / -1; }
.estado-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 16px; border-radius: 20px;
  font-size: 14px; font-weight: 700; letter-spacing: 0.3px;
}
.estado-badge.necesita { background: rgba(255,105,0,0.2); color: #ff6900; border: 1px solid rgba(255,105,0,0.4); }
.estado-badge.ok { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.4); }
.estado-badge.nofunciona { background: rgba(102,102,102,0.2); color: #999; border: 1px solid rgba(102,102,102,0.4); }

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
::-webkit-scrollbar-thumb { background: #ff6900; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #e65c00; }

/* Firefox scrollbar */
* { scrollbar-width: thin; scrollbar-color: #ff6900 rgba(255,255,255,0.02); }

.toggle-panel {
  position: fixed; top: 80px; right: 0; z-index: 50;
  background: #ff6900; color: #fff; border: none; border-radius: 8px 0 0 8px;
  padding: 12px 8px; cursor: pointer; font-size: 16px; transition: right 0.25s cubic-bezier(0.4, 0, 0.2, 1), background 0.2s;
  box-shadow: -2px 2px 8px rgba(0,0,0,0.3);
}
.toggle-panel:hover { background: #ff8533; }
.toggle-panel.cerrado { right: 0; }
.toggle-panel.abierto { right: 380px; }
.toggle-panel.oculto { display: none; }

@media (max-width: 860px) {
  .header { flex-wrap: wrap; gap: 8px; padding: 8px 10px; }
  .header-busqueda { order: 10; width: 100%; margin-left: 0; }
  .header-busqueda input { width: 100%; }
  .header h1 { font-size: 14px; margin-right: auto; }
  .leyenda { order: 8; gap: 10px; font-size: 11px; }
  .zoom-controls { order: 6; }
  .piso-selector { order: 5; }
  .filter-select { font-size: 11px; padding: 3px 6px; }
  .limpiar-btn { width: 28px; height: 28px; font-size: 12px; }
  .header-stats { order: 9; margin-left: 0; flex-wrap: wrap; }
  .switch-tema { order: 4; }
  .sync-btn { order: 2; }
  .panel { position: fixed; top: 0; right: 0; height: 100%; z-index: 500; width: 100%; max-width: 360px; }
  .toggle-panel.abierto { right: 360px; }
  .logo-badge { display: none; }
  .footer .logo-badge { display: inline-flex; flex-direction: row; gap: 6px; padding: 0; }
  .footer .logo-badge .logo-letters svg { height: 16px; }
  .footer .logo-badge .logo-line { display: none; }
  .footer .logo-badge .logo-sub { display: none; }
  .footer { padding: 8px 14px; gap: 8px; font-size: 11px; }
  .footer .sep { margin: 0 2px; }
  .minimapa { width: 100px; height: 70px; bottom: 8px; right: 8px; }
  .toggle-panel { top: 66px; padding: 8px 5px; font-size: 13px; }
}
@media (max-width: 480px) {
  .header { gap: 6px; padding: 6px 8px; }
  .header h1 { font-size: 12px; }
  .volver-btn { width: 28px; height: 28px; font-size: 15px; }
  .zoom-btn { width: 28px; height: 28px; font-size: 13px; }
  .zoom-level { min-width: 30px; font-size: 10px; }
  .piso-btn { padding: 5px 12px; font-size: 12px; }
  .piso-btn:not(.active).lista-btn { width: 28px; height: 28px; font-size: 14px; }
  .switch-tema { width: 28px; height: 28px; font-size: 14px; }
  .sync-btn { width: 28px; height: 28px; font-size: 13px; }
  .limpiar-btn { width: 26px; height: 26px; font-size: 11px; }
  .leyenda { font-size: 10px; gap: 6px; }
  .stat-item { font-size: 10px; padding: 1px 6px; }
  .filter-select { font-size: 10px; padding: 2px 5px; max-width: 110px; }
  .header-stats { gap: 4px; }
  .panel { max-width: 100%; }
  .toggle-panel.abierto { right: 100%; }
  .toggle-panel { top: 60px; }
  .lightbox { padding: 10px; }
  .lb-nav { width: 32px; height: 32px; font-size: 16px; }
  .lb-nav.prev { left: 6px; }
  .lb-nav.next { right: 6px; }
  .lightbox .cerrar-lb { top: 10px; right: 10px; width: 36px; height: 36px; font-size: 18px; }
  .lb-counter { font-size: 11px; top: 10px; padding: 2px 10px; }
  .lb-info { padding: 20px 12px 10px; }
  .lb-info .nro { font-size: 12px; }
  .lb-info .ub { font-size: 11px; }
  .info-grid { grid-template-columns: 1fr; }
  .minimapa { width: 70px; height: 50px; }
  .footer { padding: 6px 10px; gap: 4px; font-size: 10px; flex-direction: column; }
  .footer .sync-status { font-size: 10px; }
}
.header-busqueda { position: relative; display: flex; align-items: center; gap: 8px; margin-left: auto; }
.header-busqueda input {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px; padding: 6px 14px; color: #fff; font-size: 13px;
  outline: none; width: 160px; transition: 0.2s;
}
.header-busqueda input::placeholder { color: rgba(255,255,255,0.3); }
.header-busqueda input:focus { border-color: #ff6900; background: rgba(255,255,255,0.08); }
.header-stats {
  display: flex; align-items: center; gap: 6px; margin-left: 12px;
}
.stat-item {
  display: flex; align-items: center; gap: 3px; font-size: 12px; padding: 2px 8px;
  border-radius: 10px; background: #515151; cursor: pointer;
  border: 1px solid transparent; transition: 0.2s;
}
.stat-item:hover { background: #666; }
.stat-item.activo { border-color: #ff6900; background: rgba(255,105,0,0.15); }
.stat-item .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.filter-select {
  background: #515151; border: 1px solid rgba(255,255,255,0.08); color: #fff;
  border-radius: 4px; padding: 4px 8px; font-size: 12px; font-family: 'Inter', sans-serif;
  cursor: pointer; outline: none; transition: 0.2s;
}
.filter-select:hover { border-color: #ff6900; }
body.modo-profesional .filter-select { background: rgba(10,10,10,0.95); border-color: transparent; }
.limpiar-btn {
  width: 32px; height: 32px; border: none; border-radius: 4px; cursor: pointer;
  background: #515151; border: 1px solid rgba(255,255,255,0.08);
  color: #fff; font-size: 14px; display: flex; align-items: center; justify-content: center;
  transition: 0.2s; flex-shrink: 0;
}
.limpiar-btn:hover { background: #ff6900; color: #fff; }
body.modo-profesional .limpiar-btn { background: rgba(10,10,10,0.95); border-color: transparent; }
body.modo-profesional .limpiar-btn:hover { background: #ff6900; }
.search-suggestions {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 1000;
  background: rgba(15,15,25,0.98); border: 1px solid #333; border-radius: 0 0 8px 8px;
  max-height: 200px; overflow-y: auto; display: none; margin-top: 2px;
}
.search-suggestions.show { display: block; }
.search-suggestion {
  padding: 8px 14px; cursor: pointer; font-size: 13px;
  border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 8px;
}
.search-suggestion:hover { background: #ff6900; color: #fff; }
.search-suggestion .sug-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.search-suggestion .sug-nro { font-weight: 700; min-width: 30px; }
.search-suggestion .sug-ub { color: #aaa; font-size: 12px; }
.search-suggestion:hover .sug-ub { color: #ddd; }

.lightbox {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.92); justify-content: center; align-items: center;
  cursor: zoom-out; padding: 40px;
}
.lightbox.activo { display: flex; }
.lb-content {
  display: flex; flex-direction: column; align-items: center;
  max-width: 95vw; max-height: 90vh; width: 100%;
  cursor: default; border-radius: 8px; overflow: hidden; position: relative;
}
.lb-track {
  display: flex; flex: 1; width: 100%; overflow: hidden;
  scroll-snap-type: x mandatory; scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch; cursor: grab; border-radius: 8px;
}
.lb-track.dragging { cursor: grabbing; scroll-behavior: auto; }
.lb-track::-webkit-scrollbar { display: none; }
.lb-slide {
  flex: 0 0 100%; scroll-snap-align: start;
  display: flex; align-items: center; justify-content: center;
  max-height: 85vh;
}
.lb-slide img {
  max-width: 100%; max-height: 85vh; object-fit: contain;
  border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  user-select: none; -webkit-user-drag: none; pointer-events: none;
}
.lb-dots {
  position: absolute; bottom: 56px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 8px; padding: 8px 0;
  min-height: 16px; z-index: 6; pointer-events: none;
}
.lb-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(255,255,255,0.3); border: none; cursor: pointer;
  transition: 0.2s; padding: 0; pointer-events: auto;
}
.lb-dot.activo { background: #ff6900; transform: scale(1.3); }
.lb-dot:hover { background: rgba(255,105,0,0.6); }
.lightbox .cerrar-lb {
  position: fixed; top: 20px; right: 30px; font-size: 24px;
  color: #fff; cursor: pointer; width: 50px; height: 50px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; background: rgba(255,255,255,0.1); border: none;

(function initMinimap() {
  const mc = document.getElementById('minimapa');
  if (!mc) return;
  mc.width = 160; mc.height = 113;
  mc.addEventListener('click', (e) => {

    const my = (e.clientY - rect.top) / mc.offsetHeight * IMG_H;
    const wr2 = wrapper.getBoundingClientRect();
    panX = (wr2.width / 2) / zoom - mx;
    panY = (wr2.height / 2) / zoom - my;

function abrirOT(nro) {
  if (!nro) return;
  fetch('/ot/' + BRANCH_KEY + '/' + nro + '.pdf')
    .then(function(r) { if (!r.ok) throw new Error(); return r.blob(); })
    .then(function(blob) {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'OT_' + nro + '.pdf';
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(a.href); }, 1000);
    })
    .catch(function() { window.open(OT_URL_BASE + nro, '_blank', 'noopener'); });
}

function estadoClase(estado) {
  const e = (estado || '').toLowerCase();
  if (!e || e === 'no funciona') return 'nofunciona';
  if (e === 'ok') return 'ok';
  return 'necesita';
}

function formatearFecha(str) {
  if (!str || str === '—' || str === 'No funciona') return str || '—';
  const partes = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (!partes) return str;
  const [_, d, m, a] = partes;
  const fecha = new Date(+a, +m - 1, +d);
  const hoy = new Date();
  hoy.setHours(0, 0, 0, 0);
  fecha.setHours(0, 0, 0, 0);
  const diffMs = hoy - fecha;
  const diffDias = Math.round(diffMs / 86400000);
  let relativo = '';
  if (diffDias === 0) relativo = 'Hoy';
  else if (diffDias === 1) relativo = 'Ayer';
  else if (diffDias < 30) relativo = 'hace ' + diffDias + ' días';
  else if (diffDias < 365) relativo = 'hace ' + Math.floor(diffDias / 30) + ' meses';
  else relativo = 'hace ' + Math.floor(diffDias / 365) + ' años';
  const dd = d.padStart(2, '0');
  const mm = m.padStart(2, '0');
  return dd + '/' + mm + '/' + a + ' <span class="fecha-rel">— ' + relativo + '</span>';
}

function calcularProximoService(str, intervaloMeses) {
  if (!str || str === '-' || str === '—' || str === 'No funciona') return { html: '-', cls: '' };
  const partes = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (!partes) return { html: str, cls: '' };
  const [_, d, m, a] = partes;
  const ultimo = new Date(+a, +m - 1, +d);
  const hoy = new Date();
  hoy.setHours(0, 0, 0, 0);
  ultimo.setHours(0, 0, 0, 0);
  const intMeses = intervaloMeses || 6;
  const proximo = new Date(ultimo);
  proximo.setMonth(proximo.getMonth() + intMeses);
  proximo.setHours(0, 0, 0, 0);
  const diffMs = proximo - hoy;
  const diffDias = Math.round(diffMs / 86400000);
  let relativo, cls;
  if (diffDias < 0) {
    const atraso = Math.abs(diffDias);
    if (atraso < 30) relativo = 'Vencido hace ' + atraso + ' d\u00edas'; else if (atraso < 365) relativo = 'Vencido hace ' + Math.floor(atraso / 30) + ' meses'; else relativo = 'Vencido hace ' + Math.floor(atraso / 365) + ' a\u00f1os';
    cls = '#e63946';
  } else if (diffDias === 0) {
    relativo = 'Vence hoy';
    cls = '#e63946';
  } else if (diffDias <= 30) {
    relativo = 'Vence en ' + diffDias + ' d\u00edas';
    cls = '#ff6900';
  } else if (diffDias <= 90) {
    relativo = 'Vence en ' + Math.floor(diffDias / 30) + ' meses';
    cls = '#ff6900';
  } else {
    relativo = 'Vence en ' + Math.floor(diffDias / 30) + ' meses';
    cls = '#2ecc71';
  }
  const dd = String(proximo.getDate()).padStart(2, '0');
  const mm = String(proximo.getMonth() + 1).padStart(2, '0');
  const aa = proximo.getFullYear();
  return { html: dd + '/' + mm + '/' + aa + ' <span class="fecha-rel" style="color:' + cls + '">\u2014 ' + relativo + '</span>', cls };
}

function clamps() {
  const wr = wrapper.getBoundingClientRect();
  const minVis = 100;
  const maxPX = (wr.width - minVis) / zoom;
  const minPX = minVis / zoom - IMG_W;
  const maxPY = (wr.height - minVis) / zoom;
  const minPY = minVis / zoom - IMG_H;
  panX = Math.max(minPX, Math.min(maxPX, panX));
  panY = Math.max(minPY, Math.min(maxPY, panY));
}

let minimapaDirty = false;
function solicitarMinimapa() {
  if (minimapaDirty) return;
  minimapaDirty = true;
  requestAnimationFrame(() => {
    minimapaDirty = false;
    dibujarMinimapa();
  });
}
function aplicarTransform() {
  clamps();
  container.style.transform = 'scale(' + zoom + ') translate(' + panX + 'px, ' + panY + 'px)';
  zoomLevelEl.textContent = Math.round(zoom * 100) + '%';
  solicitarMinimapa();
}

function fitToScreen() {
  const wr = wrapper.getBoundingClientRect();
  const zx = wr.width / IMG_W;
  const zy = wr.height / IMG_H;
  zoom = Math.min(zx, zy, 1) * 0.9;
  panX = (wr.width - IMG_W * zoom) / (2 * zoom);
  panY = (wr.height - IMG_H * zoom) / (2 * zoom);
  aplicarTransform();
}

function zoomCentrado(factor) {
  const wr = wrapper.getBoundingClientRect();
  const cx = wr.width / 2;
  const cy = wr.height / 2;
  const oldZ = zoom;
  zoom = Math.max(0.1, Math.min(10, zoom * factor));
  panX = panX + cx * (1/zoom - 1/oldZ);
  panY = panY + cy * (1/zoom - 1/oldZ);
  aplicarTransform();
}

function animarZoom(zoomDest, panXDest, panYDest, duracion) {
  const z0 = zoom, px0 = panX, py0 = panY;
  const t0 = performance.now();
  function paso(ahora) {
    const t = Math.min((ahora - t0) / duracion, 1);
    const e = 1 - Math.pow(1 - t, 3);
    zoom = z0 + (zoomDest - z0) * e;
    panX = px0 + (panXDest - px0) * e;
    panY = py0 + (panYDest - py0) * e;
    aplicarTransform();
    if (t < 1) requestAnimationFrame(paso);
  }
  requestAnimationFrame(paso);
}
function zoomIn() { zoomCentrado(1.4); }
function zoomOut() { zoomCentrado(1/1.4); }
function resetView() { fitToScreen(); }

const minimapaCanvas = document.getElementById('minimapa');
function dibujarMinimapa() {
  const c = minimapaCanvas;
  if (!c) return;
  const ctx = c.getContext('2d');
  const cw = c.width, ch = c.height;
  ctx.clearRect(0, 0, cw, ch);
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, cw, ch);
  const sx = cw / IMG_W, sy = ch / IMG_H;
  ctx.fillStyle = '#ff6900';
  const vw = (wrapper.clientWidth / zoom) * sx;
  const vh = (wrapper.clientHeight / zoom) * sy;
  const vx = (-panX) * sx;
  const vy = (-panY) * sy;
  ctx.globalAlpha = 0.3;
  ctx.fillRect(vx, vy, vw, vh);
  ctx.globalAlpha = 0.8;
  ctx.strokeStyle = '#ff6900';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(vx, vy, vw, vh);
  const equipos = equiposFiltrados();
  equipos.forEach(eq => {
    const mx = eq.x * sx, my = eq.y * sy;
    const cls = estadoClase(eq.estado);
    ctx.beginPath();
    ctx.arc(mx, my, 3, 0, Math.PI * 2);
    ctx.fillStyle = cls === 'necesita' ? '#ff6900' : cls === 'ok' ? '#2ecc71' : '#666';
    ctx.globalAlpha = 0.85;
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function centrarEnMarker(eq) {
  const wr = wrapper.getBoundingClientRect();
  const targetZoom = Math.max(0.1, Math.min(10, Math.min(0.6, (wr.width / IMG_W) * 2)));
  const targetPanX = (wr.width / 2) / targetZoom - eq.x;
  const targetPanY = (wr.height / 2) / targetZoom - eq.y;
  animarZoom(targetZoom, targetPanX, targetPanY, 350);
}

function renderizarMarcadores() {
  document.querySelectorAll('.marker').forEach(m => m.remove());
  const texto = (document.getElementById('search-input')?.value || '').toLowerCase().trim();
  const equipos = EQUIPOS.filter(e => e.piso === pisoActual);
  equipos.forEach(eq => {
    if (filtroMarca && eq.marca !== filtroMarca) return;

    const matchTexto = !texto || String(eq.nro).includes(texto) || eq.ubicacion.toLowerCase().includes(texto);
    if (!matchTexto) return;
    const cls = estadoClase(eq.estado);
    if (filtroEstado && cls !== filtroEstado) return;
    const m = document.createElement('div');
    m.className = 'marker ' + estadoClase(eq.estado);

    m.style.left = eq.x + 'px';
    m.style.top = eq.y + 'px';

             '<span class="tt-label">Estado</span><br><span class="tt-dot" style="background:' + dotColor + '"></span>' + eq.estado;
    if (eq.marca) tt += '<br><span class="tt-label">Marca</span><br>' + eq.marca;
    if (eq.capacidad) tt += '<br><span class="tt-label">Capacidad</span><br>' + eq.capacidad;
    if (eq.ultimo_service) tt += '<br><span class="tt-label">&Uacute;ltimo service</span><br>' + eq.ultimo_service;
    m.innerHTML = eq.nro + '<div class="tooltip">' + tt + '</div>';

      trackClick('marker', eq.nro);

  actualizarStats();

}

function copiarEquipo() {
  const eq = equipoSeleccionado;
  if (!eq) return;
  const lines = [
    'Equipo #' + eq.nro,
    'Ubicación: ' + eq.ubicacion,
    'Marca: ' + eq.marca,
    'Capacidad: ' + eq.capacidad,
    'Último Service: ' + (eq.ultimo_service || '—'),
    'Estado: ' + (eq.estado || 'Sin datos'),
    'OT: ' + (eq.ot || '—') + (eq.ot ? ' — ' + OT_URL_BASE + eq.ot : ''),
    'Piso: ' + (eq.piso === 'pb' ? 'Planta Baja' : 'Planta Alta')
  ];
  const copiar = (txt) => {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(txt);
    }
    const ta = document.createElement('textarea');
    ta.value = txt; ta.style.cssText = 'position:fixed;left:-9999px;top:0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    return Promise.resolve();
  };
  copiar(lines.join('\n')).then(() => {
    const btn = document.querySelector('.panel-copy');
    if (btn) { btn.innerHTML = '<i class="ph ph-check"></i>'; setTimeout(() => { btn.innerHTML = '<i class="ph ph-copy"></i>'; }, 1500); }
  }).catch(() => {});
}

let carruselDrag = false, carruselStartX = 0, carruselScrollLeft = 0, carruselMoved = false;
let carruselTrack = null;
let carruselEq = null;

function initCarousel() {
  const track = document.querySelector('.foto-track');
  if (!track) return;
  carruselTrack = track;

  const newTrack = track.cloneNode(true);
  track.parentNode.replaceChild(newTrack, track);
  carruselTrack = newTrack;

  const actualizarDot = () => {
    const dots = document.querySelectorAll('.carousel-dot');
    if (dots.length < 2) return;
    const idx = Math.round(carruselTrack.scrollLeft / carruselTrack.clientWidth);
    dots.forEach(d => d.classList.remove('activo'));
    if (dots[idx]) dots[idx].classList.add('activo');
  };

  // Dots navigation
  const fotoContainer = newTrack.closest('.foto-container');
  if (fotoContainer) {
    fotoContainer.querySelectorAll('.carousel-dot').forEach(dot => {
      dot.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(dot.dataset.idx);
        newTrack.children[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
      });
    });
  }

  newTrack.addEventListener('scroll', actualizarDot);

  newTrack.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    e.preventDefault();
    carruselDrag = true;
    carruselMoved = false;
    carruselStartX = e.clientX;
    carruselScrollLeft = newTrack.scrollLeft;
    newTrack.classList.add('dragging');
    newTrack.style.scrollSnapType = 'none';
  });
}

document.addEventListener('mousemove', (e) => {
  if (!carruselDrag || !carruselTrack) return;
  e.preventDefault();
  const dx = e.clientX - carruselStartX;
  if (Math.abs(dx) > 5) carruselMoved = true;
  carruselTrack.scrollLeft = carruselScrollLeft - dx;
});

document.addEventListener('mouseup', () => {
  if (!carruselDrag || !carruselTrack) return;
  const track = carruselTrack;
  carruselDrag = false;
  track.classList.remove('dragging');
  track.style.scrollSnapType = '';
  if (carruselMoved) {
    const slideW = track.clientWidth;
    const rawIdx = track.scrollLeft / slideW;
    let targetIdx;
    if (track.scrollLeft > carruselScrollLeft) {
      targetIdx = Math.floor(rawIdx + 0.93);
    } else if (track.scrollLeft < carruselScrollLeft) {
      targetIdx = Math.ceil(rawIdx - 0.93);
    } else {
      targetIdx = Math.round(rawIdx);
    }
    const targetSlide = track.children[targetIdx];
    if (targetSlide) targetSlide.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
    const killClick = (ce) => { ce.stopPropagation(); track.removeEventListener('click', killClick, true); };
    track.addEventListener('click', killClick, true);
  }
});

// Pan
wrapper.addEventListener('mousedown', (e) => {
  if (e.button !== 0 || e.target.closest('.marker')) return;
  isPanning = true;
  panOcurrio = false;
  panStart = { x: e.clientX - panX * zoom, y: e.clientY - panY * zoom };
  wrapper.classList.add('grabbing');
  e.preventDefault();
});

window.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  panOcurrio = true;
  panX = (e.clientX - panStart.x) / zoom;
  panY = (e.clientY - panStart.y) / zoom;
  aplicarTransform();
});

window.addEventListener('mouseup', () => {
  if (isPanning) { isPanning = false; wrapper.classList.remove('grabbing'); }
});

// Zoom wheel
wrapper.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = wrapper.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const oldZ = zoom;
  const delta = e.deltaY > 0 ? 1 / 1.2 : 1.2;
  zoom = Math.max(0.1, Math.min(10, zoom * delta));
  panX = panX + mx * (1/zoom - 1/oldZ);
  panY = panY + my * (1/zoom - 1/oldZ);
  aplicarTransform();
}, { passive: false });

// Double-click zoom
wrapper.addEventListener('dblclick', (e) => {
  if (e.target.closest('.marker')) return;
  const rect = wrapper.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const oldZ = zoom;
  zoom = Math.min(zoom * 2, 10);
  panX = panX + mx * (1/zoom - 1/oldZ);
  panY = panY + my * (1/zoom - 1/oldZ);
  aplicarTransform();
});

// Click on plan background closes panel (solo si no hubo arrastre)
wrapper.addEventListener('click', (e) => {
  if (e.target.closest('.marker')) return;
  if (panOcurrio) { panOcurrio = false; return; }
  if (e.button === 0) cerrarPanelCompleto();
});

  const wr = wrapper.getBoundingClientRect();
  panX = (wr.width - IMG_W * zoom) / (2 * zoom);

  aplicarTransform();

    }

});

let lbDrag = false, lbStartX = 0, lbStartScroll = 0, lbMoved = false;
let lbEquipo = null, lbIdx = 0;

function cerrarLightbox() {
  document.getElementById('lightbox').classList.remove('activo');
}

function abrirLightbox(equipo, idx) {
  lbEquipo = equipo; lbIdx = idx;
  const fotos = equipo.fotos || [];
  const track = document.getElementById('lb-track');
  const dots = document.getElementById('lb-dots');
  track.innerHTML = fotos.map((f, i) =>
    '<div class="lb-slide"><div class="skeleton" style="min-height:200px;width:100%"></div><img src="' + f + '" alt="" draggable="false" loading="' + (i > 0 ? 'lazy' : 'eager') + '" onload="this.previousElementSibling.remove()" onerror="this.parentElement.innerHTML=\'<div class=\\\'sin-foto\\\' style=\\\'padding:40px;text-align:center;color:#888\\\'><i class=\\\'ph ph-camera-slash\\\' style=\\\'font-size:32px;display:block;margin-bottom:8px\\\'></i>Foto no disponible</div>\'"></div>'
  ).join('');
  if (fotos.length > 1) {
    dots.innerHTML = fotos.map((_, i) =>
      '<button class="lb-dot' + (i === idx ? ' activo' : '') + '" data-idx="' + i + '"></button>'
    ).join('');
  } else {
    dots.innerHTML = '';
  }
  actualizarLbInfo();

function actualizarLbInfo() {
  const eq = lbEquipo;
  const total = (eq.fotos || []).length;
  document.getElementById('lb-counter').textContent = total > 1 ? (lbIdx + 1) + ' / ' + total : '';
  const badgeClase = estadoClase(eq.estado);
  document.getElementById('lb-info').innerHTML =
    '<span class="nro">#' + eq.nro + '</span>' +
    '<span class="ub">' + eq.ubicacion + '</span>' +
    '<span class="badge ' + badgeClase + '">' + eq.estado + '</span>';
}

function actualizarLbCounter() {
  const track = document.getElementById('lb-track');
  const total = (lbEquipo?.fotos || []).length;
  if (total < 2) return;
  const i = Math.round(track.scrollLeft / track.clientWidth);
  if (i !== lbIdx) { lbIdx = i; actualizarLbInfo(); }
}

function navegarLb(dir) {
  const track = document.getElementById('lb-track');
  const total = (lbEquipo?.fotos || []).length;
  if (total < 2) return;
  const i = Math.round(track.scrollLeft / track.clientWidth);
  const next = Math.max(0, Math.min(total - 1, i + dir));
  track.children[next].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
}

function initLbCarousel() {
  const track = document.getElementById('lb-track');
  if (!track) return;

  const newTrack = track.cloneNode(true);
  track.parentNode.replaceChild(newTrack, track);
  newTrack.id = 'lb-track';
  newTrack.scrollLeft = lbIdx * newTrack.clientWidth;

  const dots = document.querySelectorAll('.lb-dot');
  const onLbScroll = () => {
    if (dots.length > 1) {
      const i = Math.round(newTrack.scrollLeft / newTrack.clientWidth);
      dots.forEach(d => d.classList.remove('activo'));
      if (dots[i]) dots[i].classList.add('activo');
    }
    actualizarLbCounter();
  };
  newTrack.addEventListener('scroll', onLbScroll);

  dots.forEach(dot => {
    dot.addEventListener('click', (e) => {
      e.stopPropagation();
      const i = parseInt(dot.dataset.idx);
      newTrack.children[i].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
    });
  });

  newTrack.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    e.preventDefault();
    lbDrag = true; lbMoved = false;
    lbStartX = e.clientX;
    lbStartScroll = newTrack.scrollLeft;
    newTrack.classList.add('dragging');
    newTrack.style.scrollSnapType = 'none';
  });
}

document.addEventListener('mousemove', (e) => {
  if (!lbDrag) return;
  e.preventDefault();
  const track = document.getElementById('lb-track');
  if (!track) return;
  const dx = e.clientX - lbStartX;
  if (Math.abs(dx) > 5) lbMoved = true;
  track.scrollLeft = lbStartScroll - dx;
});

document.addEventListener('mouseup', () => {
  if (!lbDrag) return;
  const track = document.getElementById('lb-track');
  lbDrag = false;
  if (!track) return;
  track.classList.remove('dragging');
  track.style.scrollSnapType = '';
  if (lbMoved) {
    const slideW = track.clientWidth;
    const rawIdx = track.scrollLeft / slideW;
    let targetIdx;
    if (track.scrollLeft > lbStartScroll) {
      targetIdx = Math.floor(rawIdx + 0.9);
    } else if (track.scrollLeft < lbStartScroll) {
      targetIdx = Math.ceil(rawIdx - 0.9);
    } else {
      targetIdx = Math.round(rawIdx);
    }
    const s = track.children[targetIdx];
    if (s) s.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
    const kill = (e) => { e.stopPropagation(); track.removeEventListener('click', kill, true); };
    track.addEventListener('click', kill, true);
  }
});

function equiposFiltrados() {

    if (filtroCapacidad && e.capacidad !== filtroCapacidad) return false;
    if (filtroEstado && estadoClase(e.estado) !== filtroEstado) return false;
    return true;
  });

function actualizarStats() {

  const cont = document.getElementById('search-suggestions');
  cont.innerHTML = '';
  if (!texto.trim()) { cont.classList.remove('show'); return; }
  const t = texto.toLowerCase().trim();
  const matches = EQUIPOS.filter(e => {
    if (e.piso !== pisoActual) return false;
    if (filtroMarca && e.marca !== filtroMarca) return false;
    if (filtroCapacidad && e.capacidad !== filtroCapacidad) return false;
    return String(e.nro).includes(t) || e.ubicacion.toLowerCase().includes(t);
  }).slice(0, 10);
  if (!matches.length) { cont.classList.remove('show'); return; }
  matches.forEach(eq => {
    const d = document.createElement('div');
    d.className = 'search-suggestion';
    const cls = estadoClase(eq.estado);
    const dotColor = cls === 'necesita' ? '#ff6900' : cls === 'ok' ? '#2ecc71' : '#666';
    d.innerHTML = '<span class="sug-dot" style="background:' + dotColor + '"></span><span class="sug-nro">#' + eq.nro + '</span><span class="sug-ub">' + eq.ubicacion + '</span>';
    d.addEventListener('mousedown', (e) => {
      e.preventDefault();
      trackClick('search', eq.nro, document.getElementById('search-input').value);
      document.getElementById('search-input').value = eq.nro;
      cont.classList.remove('show');
      mostrarEquipo(eq.nro);
      centrarEnMarker(eq);
      flashMarker(eq.nro);
    });
    cont.appendChild(d);
  });
  cont.classList.add('show');
}

function cerrarSug() {
  document.getElementById('search-suggestions').classList.remove('show');
}

// Pinch-to-zoom
let lastTouchDist = 0;
wrapper.addEventListener('touchstart', (e) => {
  if (e.target.closest('.marker')) return;
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  } else if (e.touches.length === 1) {
    isPanning = true;
    panOcurrio = false;
    panStart = { x: e.touches[0].clientX - panX * zoom, y: e.touches[0].clientY - panY * zoom };
    wrapper.classList.add('grabbing');
  }
});
wrapper.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    if (lastTouchDist > 0) {
      const factor = dist / lastTouchDist;
      const rect = wrapper.getBoundingClientRect();
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
      const oldZ = zoom;
      zoom = Math.max(0.1, Math.min(10, zoom * factor));
      panX = panX + cx * (1/zoom - 1/oldZ);
      panY = panY + cy * (1/zoom - 1/oldZ);
      aplicarTransform();
    }
    lastTouchDist = dist;
  } else if (e.touches.length === 1 && isPanning) {
    e.preventDefault();
    panOcurrio = true;
    panX = (e.touches[0].clientX - panStart.x) / zoom;
    panY = (e.touches[0].clientY - panStart.y) / zoom;
    aplicarTransform();
  }
});
wrapper.addEventListener('touchend', () => {
  lastTouchDist = 0;
  if (isPanning) {
    isPanning = false;
    wrapper.classList.remove('grabbing');
  }
});

// Focus trap for lightbox
let lbFocusTrap = null;
function initFocusTrap() {
  const lb = document.getElementById('lightbox');
  const focusable = lb.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
  if (focusable.length < 2) return;
  const first = focusable[0], last = focusable[focusable.length - 1];
  if (lbFocusTrap) lb.removeEventListener('keydown', lbFocusTrap);
  lbFocusTrap = (e) => {
    if (e.key !== 'Tab') return;
    if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
    else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
  };
  lb.addEventListener('keydown', lbFocusTrap);
  setTimeout(() => focusable[0]?.focus(), 100);
}
// Patch abrirLightbox to init focus trap
const _origAbrirLb = abrirLightbox;
abrirLightbox = function(eq, idx) { _origAbrirLb(eq, idx); initFocusTrap(); };

// Fetch live data from Cloudflare Worker
function cargarEquipos() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', '/api/equipos/' + BRANCH_KEY, true);
  xhr.onload = function() {
    if (xhr.status !== 200) return;
    try {
      var data = JSON.parse(xhr.responseText);
      if (!data || !data.length) return;
      var map = {};
      data.forEach(function(eq) { map[eq.nro] = eq; });
      var cambios = 0;
      EQUIPOS.forEach(function(eq) {
        var upd = map[eq.nro];
        if (upd) { Object.assign(eq, upd); cambios++; }
      });
      document.getElementById('sync-time').textContent = new Date().toLocaleString('es-AR', { timeZone: 'America/Argentina/Buenos_Aires', hour12: false });
      if (cambios > 0) {
        renderizarMarcadores();
        actualizarStats();
        poblarFiltros();
      if (document.getElementById('lista-overlay').classList.contains('activo')) renderLista();
      }
    } catch(e) {}
  };
  xhr.send();
}

// Sync button
function syncData() {
  const btn = document.getElementById('sync-btn');
  if (btn.classList.contains('syncing')) return;
  btn.classList.add('syncing');
  btn.innerHTML = '<i class="ph ph-spinner"></i>';
  fetch('/api/sync')
    .then(r => r.json())
    .then(data => {
      if (!data.success) throw new Error(data.output);
      const branch = data.branches['colon'];
      if (!branch) throw new Error('No data for this branch');
      const map = {};
      branch.forEach(eq => { map[eq.nro] = eq; });
      EQUIPOS.forEach(eq => {
        const upd = map[eq.nro];
        if (upd) Object.assign(eq, upd);
      });
      renderizarMarcadores();
      actualizarStats();
      poblarFiltros();
      if (document.getElementById('lista-overlay').classList.contains('activo')) renderLista();
      if (equipoSeleccionado) mostrarEquipo(equipoSeleccionado.nro);
      document.getElementById('sync-time').textContent = new Date(data.timestamp).toLocaleString('es-AR', { timeZone: 'America/Argentina/Buenos_Aires', hour12: false });
      btn.innerHTML = '<i class="ph ph-check"></i>';
      setTimeout(() => { btn.innerHTML = '<i class="ph ph-arrows-clockwise"></i>'; btn.classList.remove('syncing'); }, 2000);
    })
    .catch(() => {
      btn.innerHTML = '<i class="ph ph-x"></i>';
      setTimeout(() => { btn.innerHTML = '<i class="ph ph-arrows-clockwise"></i>'; btn.classList.remove('syncing'); }, 3000);
    });
}
