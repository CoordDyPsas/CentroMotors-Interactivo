<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<title>DyP — Planos Interactivos</title>
<link rel="preconnect" crossorigin href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
  background: #0d0d1a;
  min-height: 100vh; display: flex; flex-direction: column;
  color: #f0f0f0;
}
.header {
  background: rgba(10,10,10,0.95); -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
  padding: 10px 18px; display: flex; align-items: center; gap: 12px;
  border-bottom: 2px solid #ff6900; flex-shrink: 0;
  box-shadow: 0 2px 20px rgba(0,0,0,0.4); position: relative; z-index: 10;
  transition: background 0.4s ease;
}
.header h1 { font-size: 17px; font-weight: 600; color: #fff; letter-spacing: 0.3px; }
.header h1 span { color: #ff6900; font-weight: 700; }
.logo-badge {
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  background: rgba(255,255,255,0.92); padding: 6px 14px;
  border-radius: 8px; flex-shrink: 0;
  transition: background 0.4s ease;
}
.logo-letters { display: flex; align-items: center; line-height: 1; }
.logo-letters svg { height: 1em; width: auto; display: block; }
.logo-letters svg path { transition: fill 0.4s ease; }
.logo-letters svg .d-path { fill: #444; }
.logo-letters svg .y-path { fill: #ff6900; }
.logo-letters svg .p-path { fill: #444; }
.logo-line { width: 100%; height: 2px; background: #ff6900; border-radius: 1px; }
.logo-sub { font-family: Arial, Helvetica, sans-serif; font-size: 6.8px; font-weight: 700; color: #444; white-space: nowrap; line-height: 1; transition: color 0.4s ease; }

.main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
.main h1 { font-size: 30px; font-weight: 700; margin-bottom: 4px; }
.main h1 span { color: #ff6900; }
.subtitle { color: #888; margin-bottom: 40px; font-size: 15px; }
.sucursales {
  display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
  max-width: 840px;
}
.card {
  background: rgba(30,30,50,0.8); border: 1px solid rgba(255,105,0,0.3);
  border-radius: 14px; padding: 30px 34px; width: 250px;
  cursor: pointer; transition: all 0.3s; text-align: center;
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: #ff6900; transform: scaleX(0); transition: transform 0.3s;
}
.card:hover::before { transform: scaleX(1); }
.card:hover {
  border-color: #ff6900; transform: translateY(-6px);
  box-shadow: 0 8px 30px rgba(255,105,0,0.35);
}
.card .icon { font-size: 42px; margin-bottom: 14px; color: #ff6900; }
.card h2 { font-size: 18px; margin-bottom: 4px; color: #fff; }
.card .count { font-size: 13px; color: #888; }
.card .badge {
  display: inline-block; margin-top: 14px; padding: 5px 18px;
  border-radius: 20px; font-size: 12px; font-weight: 600;
}
.card .badge.listo { background: #2ecc71; color: #111; }
.card .badge.pendiente { background: rgba(255,255,255,0.1); color: #888; }
.card.disabled { opacity: 0.35; cursor: default; pointer-events: none; }
.card .stats-row { display: flex; gap: 6px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
.card .stat-pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; padding: 2px 10px; border-radius: 10px;
  background: rgba(255,255,255,0.06); color: #aaa;
}
.card .stat-pill .d { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.card .stat-pill.ok { color: #2ecc71; background: rgba(46,204,113,0.1); }
.card .stat-pill.necesita { color: #ff6900; background: rgba(255,105,0,0.1); }
.card .stat-pill.nofunciona { color: #999; background: rgba(153,153,153,0.1); }

/* === Theme Toggle === */
.switch-tema {
  width: 32px; height: 32px; border: none; border-radius: 4px; cursor: pointer;
  background: #515151; color: #fff; font-size: 16px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; transition: 0.2s;
  margin-left: auto; flex-shrink: 0;
}
.switch-tema:hover { background: #666666; }

.footer {
  background: rgba(15,15,30,0.85); backdrop-filter: blur(10px);
  border-top: 1px solid rgba(255,105,0,0.2);
  padding: 10px 28px; display: flex; align-items: center; justify-content: center;
  gap: 20px; font-size: 12px; color: #fff; flex-shrink: 0; flex-wrap: wrap;
  position: relative; z-index: 5;
}
.footer .sep { color: #fff; }
.footer .cliente { color: #fff; }
.footer .sync-status { color: rgba(255,255,255,0.5); font-size: 11px; display: flex; align-items: center; gap: 4px; }
.footer .sync-status i { font-size: 12px; }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #0d0d1a; }
::-webkit-scrollbar-thumb { background: #ff6900; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #e65c00; }

/* Firefox scrollbar */
* { scrollbar-width: thin; scrollbar-color: #ff6900 rgba(255,255,255,0.02); }

/* === Footer Logo === */
.footer .logo-badge { background: transparent; padding: 0; gap: 1px; }
.footer .logo-badge .logo-letters svg .d-path { fill: #fff; }
.footer .logo-badge .logo-letters svg .y-path { fill: #ff6900; }
.footer .logo-badge .logo-letters svg .p-path { fill: #fff; }
.footer .logo-badge .logo-line { height: 1.5px; }
.footer .logo-badge .logo-sub { font-size: 5.5px; color: #fff; }

/* === MODO OSCURO (gris = Modo Claro) === */
body.modo-profesional .header {
  background: rgba(81,81,81,0.85);
}
body.modo-profesional .switch-tema {
  background: rgba(10,10,10,0.95); border: 1px solid rgba(255,255,255,0.08);
}
body.modo-profesional .switch-tema:hover { background: rgba(255,255,255,0.08); }
body.modo-profesional .card {
  background: rgba(10,10,10,0.95); border: 1px solid rgba(255,255,255,0.08);
}
body.modo-profesional .card:hover {
  border-color: #ff6900;
  box-shadow: 0 8px 30px rgba(255,105,0,0.35);
}
body.modo-profesional .footer {
  background: rgba(81,81,81,0.85);
}
body.modo-profesional .footer .logo-badge { background: transparent; }
body.modo-profesional .logo-badge {
  background: #fff;
}
body.modo-profesional .logo-letters svg .d-path { fill: #111; }
body.modo-profesional .logo-letters svg .y-path { fill: #ff6900; }
body.modo-profesional .logo-letters svg .p-path { fill: #111; }
body.modo-profesional .logo-sub { color: #111; }
@view-transition { navigation: auto; }
::view-transition-old(root) { animation-duration: 0.15s; }
::view-transition-new(root) { animation-duration: 0.2s; }
@media (max-width: 860px) {
  .header { padding: 10px 14px; gap: 10px; }
  .header h1 { font-size: 15px; }
  .main { padding: 30px 16px; }
  .main h1 { font-size: 24px; }
  .subtitle { font-size: 13px; margin-bottom: 28px; }
  .card { width: 220px; padding: 24px 28px; }
  .sucursales { gap: 16px; }
  .footer { padding: 8px 14px; gap: 10px; font-size: 11px; }
  .footer .logo-badge .logo-letters svg { height: 14px; }
}
@media (max-width: 480px) {
  .header { padding: 8px 10px; gap: 8px; }
  .header .logo-badge { padding: 4px 10px; }
  .header .logo-badge .logo-letters svg { height: 0.85em; }
  .header .logo-badge .logo-sub { font-size: 5.5px; }
  .header h1 { font-size: 13px; }
  .switch-tema { width: 28px; height: 28px; font-size: 14px; }
  .main { padding: 20px 12px; }
  .main h1 { font-size: 20px; }
  .subtitle { font-size: 12px; margin-bottom: 20px; }
  .sucursales { gap: 12px; }
  .card { width: 100%; max-width: 300px; padding: 20px 22px; }
  .footer { padding: 6px 10px; gap: 6px; font-size: 10px; flex-direction: column; }
  .footer .logo-badge .logo-letters svg { height: 12px; }
  .footer .logo-badge .logo-sub { font-size: 4.5px; }
}
</style>
</head>
<body class="modo-profesional">
  <div class="header">
  <div class="logo-badge">
    <div class="logo-letters"><svg viewBox="0 0 100 41" xmlns="http://www.w3.org/2000/svg"><path class="d-path" d="M 1.67,0.67 0.00,3.12 0.56,39.02 3.90,40.91 18.51,40.80 28.32,37.01 33.89,30.99 36.57,23.75 36.23,15.38 32.66,8.03 20.62,0.33 Z M 10.70,8.36 20.85,8.92 27.76,15.83 27.98,24.41 21.63,31.55 11.37,32.66 8.36,30.10 8.14,11.48 Z"/><path class="y-path" d="M 39.24,15.94 37.57,19.19 47.49,29.49 47.49,39.01 50.95,40.80 52.40,29.49 62.32,17.51 58.75,16.17 49.94,24.90 Z"/><path class="p-path" d="M 95.21,2.56 87.40,0.00 64.10,1.34 63.10,4.79 65.66,7.92 88.07,8.25 91.75,11.48 88.74,15.61 66.33,15.83 63.88,17.39 63.10,37.46 64.77,40.13 70.68,39.02 71.24,27.54 73.24,24.53 89.74,23.63 97.66,19.06 99.78,9.59 Z"/></svg></div>
    <div class="logo-line"></div>
    <div class="logo-sub">Aire Acondicionado y Calefacción</div>
  </div>
    <h1>Planos <span>Interactivos</span></h1>
    <div class="header-actions" style="display:flex;gap:8px;margin-left:auto;align-items:center">
    <button class="switch-tema" id="switch-tema-btn" onclick="toggleTema()"><i class="ph ph-sun"></i></button>
    </div>
  </div>
  <div class="main">
    <p class="subtitle"><i class="ph ph-snowflake" style="color:#ff6900"></i> Aires acondicionados — Seleccioná una sucursal</p>
    <div class="sucursales" id="sucursales"></div>
  </div>
  <div class="footer">
  <div class="logo-badge">
    <div class="logo-letters"><svg viewBox="0 0 100 41" xmlns="http://www.w3.org/2000/svg"><path class="d-path" d="M 1.67,0.67 0.00,3.12 0.56,39.02 3.90,40.91 18.51,40.80 28.32,37.01 33.89,30.99 36.57,23.75 36.23,15.38 32.66,8.03 20.62,0.33 Z M 10.70,8.36 20.85,8.92 27.76,15.83 27.98,24.41 21.63,31.55 11.37,32.66 8.36,30.10 8.14,11.48 Z"/><path class="y-path" d="M 39.24,15.94 37.57,19.19 47.49,29.49 47.49,39.01 50.95,40.80 52.40,29.49 62.32,17.51 58.75,16.17 49.94,24.90 Z"/><path class="p-path" d="M 95.21,2.56 87.40,0.00 64.10,1.34 63.10,4.79 65.66,7.92 88.07,8.25 91.75,11.48 88.74,15.61 66.33,15.83 63.88,17.39 63.10,37.46 64.77,40.13 70.68,39.02 71.24,27.54 73.24,24.53 89.74,23.63 97.66,19.06 99.78,9.59 Z"/></svg></div>
    <div class="logo-line"></div>
    <div class="logo-sub">Aire Acondicionado y Calefacción</div>
  </div>
    <span class="sep">|</span>
    <span>Coordinación de Servicio técnico</span>
    <span class="sep">|</span>
    <span class="sync-status"><i class="ph ph-clock-counter-clockwise"></i> <span id="sync-time">Cargando...</span></span>
  </div>
  <script>
    const SUCURSALES = [
      { id: 'monsenor', nombre: 'Monseñor', icon: 'ph-buildings', equipos: [
        { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' },
        { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' },
        { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' },
        { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' },
        { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'No funciona' }, { estado: 'OK' }
      ], fotos: 21 },
      { id: 'colon', nombre: 'Colón', icon: 'ph-buildings', equipos: [
        { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' },
        { estado: 'OK' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' },
        { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' },
        { estado: 'OK' }, { estado: 'OK' }, { estado: 'OK' }, { estado: 'Necesita service' }, { estado: 'Necesita service' },
        { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' },
        { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' },
        { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' },
        { estado: 'OK' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' },
        { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' },
        { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' },
        { estado: 'Necesita service' }, { estado: 'OK' }
      ], fotos: 21 },
      { id: 'sagrada-familia', nombre: 'Sagrada Familia', icon: 'ph-buildings', equipos: [
        { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' },
        { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' },
        { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' },
        { estado: 'Necesita service' }, { estado: 'Necesita service' }, { estado: 'Necesita service' }
      ], fotos: 18 }
    ];
    function estadoClase(estado) {
      if (!estado || estado === 'No funciona') return 'nofunciona';
      if (estado === 'OK') return 'ok';
      return 'necesita';
    }
    function renderDashboard() {
      const cont = document.getElementById('sucursales');
      SUCURSALES.forEach(s => {
        const total = s.equipos.length;
        const necesita = s.equipos.filter(e => estadoClase(e.estado) === 'necesita').length;
        const ok = s.equipos.filter(e => estadoClase(e.estado) === 'ok').length;
        const nofunciona = s.equipos.filter(e => estadoClase(e.estado) === 'nofunciona').length;
        const fotoText = s.fotos ? ' · ' + s.fotos + ' con foto' : '';
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = function(){ trackClick('navegar', s.id); window.location.href = s.id + '/index.html'; };
        card.innerHTML =
          '<div class="icon"><i class="ph ' + s.icon + '"></i></div>' +
          '<h2>' + s.nombre + '</h2>' +
          '<p class="count">' + total + ' equipos' + fotoText + '</p>' +
          '<div class="stats-row">' +
          '<span class="stat-pill ok"><span class="d" style="background:#2ecc71"></span> ' + ok + '</span>' +
          '<span class="stat-pill necesita"><span class="d" style="background:#ff6900"></span> ' + necesita + '</span>' +
          '<span class="stat-pill nofunciona"><span class="d" style="background:#666"></span> ' + nofunciona + '</span>' +
          '</div>' +
          '<span class="badge listo"><i class="ph ph-eye"></i> Ver plano</span>';
        cont.appendChild(card);
      });
      // HINO card
      const hino = document.createElement('div');
      hino.className = 'card disabled';
      hino.innerHTML =
        '<div class="icon"><i class="ph ph-map-pin"></i></div>' +
        '<h2>HINO</h2>' +
        '<p class="count">Próximamente</p>' +
        '<span class="badge pendiente"><i class="ph ph-clock"></i> En desarrollo</span>';
      cont.appendChild(hino);
    }
    renderDashboard();

    function toggleTema(guardar) {
      const body = document.body;
      const btn = document.getElementById('switch-tema-btn');
      body.classList.toggle('modo-profesional');
      if (body.classList.contains('modo-profesional')) {
        btn.innerHTML = '<i class="ph ph-sun"></i>';
        if (guardar !== false) localStorage.setItem('dyp_tema', 'claro');
      } else {
        btn.innerHTML = '<i class="ph ph-moon"></i>';
        if (guardar !== false) localStorage.setItem('dyp_tema', 'oscuro');
      }
    }
    function trackClick(accion, detalle) {
      fetch('/api/track',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accion,branch:'root',detalle:detalle||null})}).catch(()=>{});
    }
    fetch('/api/me').then(r=>r.json()).then(u=>{if(u.tipo==='admin'){var b=document.createElement('button');b.className='switch-tema';b.innerHTML='<i class="ph ph-chart-bar"></i>';b.title='Dashboard administrador';b.onclick=function(){window.location.href='/admin'};document.getElementById('switch-tema-btn').before(b);}}).catch(()=>{});
    if (localStorage.getItem('dyp_tema') === 'oscuro') toggleTema(false);
    (function tick() {
      document.getElementById('sync-time').textContent = new Date().toLocaleString('es-AR', { timeZone: 'America/Argentina/Buenos_Aires', hour12: false });
      setTimeout(tick, 1000);
    })();
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
